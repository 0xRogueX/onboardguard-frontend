<div class="p-8 bg-slate-50 min-h-screen">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Case Review Workspace</h1>
    <button (click)="loadCases()" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      Refresh Queue
    </button>
  </div>

  <div *ngIf="isLoading()" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
  </div>

  <div *ngIf="!isLoading() && cases().length === 0" class="text-center py-16 bg-white rounded-xl shadow-sm border border-slate-100">
    <p class="text-slate-500 font-medium">No pending cases available at the moment.</p>
  </div>

  <div *ngIf="!isLoading() && cases().length > 0" class="grid gap-6">
    <div *ngFor="let c of cases()" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all hover:shadow-md">
      
      <div>
        <div class="flex items-center gap-3 mb-1">
          <h3 class="text-lg font-semibold text-slate-800">Candidate #{{ c.candidateId }}</h3>
          <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold"
                [ngClass]="{
                  'bg-red-100 text-red-700': getPriority(c) === 'HIGH',
                  'bg-yellow-100 text-yellow-700': getPriority(c) === 'MEDIUM',
                  'bg-green-100 text-green-700': getPriority(c) === 'LOW'
                }">
            {{ getPriority(c) }} Priority
          </span>
        </div>
        <p class="text-sm text-slate-500">Case ID: <span class="font-mono text-slate-600">{{ c.id }}</span> • Created: {{ c.createdAt | date:'mediumDate' }}</p>
      </div>

      <div class="flex items-center gap-3 w-full md:w-auto">
        <button (click)="resolveCase(c.id, 'CLEARED')" class="flex-1 md:flex-none px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
          Clear Case
        </button>
        <button (click)="resolveCase(c.id, 'REJECTED')" class="flex-1 md:flex-none px-4 py-2 bg-white border border-red-200 text-red-600 hover:bg-red-50 text-sm font-medium rounded-lg transition-colors shadow-sm">
          Reject
        </button>
      </div>
      
    </div>
  </div>
</div>
