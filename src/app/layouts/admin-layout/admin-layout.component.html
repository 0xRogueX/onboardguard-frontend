<div class="flex h-screen bg-slate-950 text-white">
  <aside class="w-72 bg-slate-950 border-r border-white/10 flex flex-col p-6">
    <div class="flex items-center gap-3 mb-10">
      <span class="material-symbols-outlined text-white text-3xl">shield_person</span>
      <div>
        <div class="text-xl font-black tracking-tight">Admin Core</div>
        <div class="text-[10px] uppercase tracking-[0.25em] text-slate-400">{{roleSummary()}}</div>
      </div>
    </div>
    <nav class="flex-1 space-y-2">
      <a routerLink="/admin/users" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">group</span>
        User Management
      </a>
      <a *ngIf="canManageConfigs()" routerLink="/admin/screening" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">tune</span>
        System Config
      </a>
      <a routerLink="/admin/reports" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">monitoring</span>
        Reporting
      </a>
      <a *ngIf="canViewAudit()" routerLink="/admin/audit" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">history</span>
        Audit Timeline
      </a>
      <a *ngIf="canReviewApprovals()" routerLink="/admin/approvals" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">fact_check</span>
        Maker-Checker Inbox
      </a>
      <a routerLink="/admin/watchlist" routerLinkActive="bg-white/10 text-white" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined">policy</span>
        Watchlist Database
      </a>
    </nav>
    <div class="pt-6 border-t border-white/10">
      <div class="flex items-center justify-between gap-3 p-3 bg-white/5 rounded-2xl">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-xs font-black shrink-0">{{displayName().charAt(0)}}</div>
          <div class="flex flex-col min-w-0">
            <span class="text-sm font-black truncate">{{displayName()}}</span>
            <span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 truncate">{{roleLabel()}}</span>
          </div>
        </div>
        <button (click)="logout()" 
          class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-xl transition-all shrink-0"
          title="Logout">
          <span class="material-symbols-outlined text-[20px]">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-y-auto bg-slate-100 text-slate-900">
    <router-outlet></router-outlet>
  </main>
</div>
