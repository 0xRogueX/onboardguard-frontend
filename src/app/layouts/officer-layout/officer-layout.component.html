<div class="flex h-screen bg-slate-900 text-slate-300">
  <!-- Officer Sidebar -->
  <aside class="w-20 hover:w-64 group bg-slate-950 flex flex-col items-center py-6 transition-all duration-300 border-r border-slate-800 z-50 overflow-hidden shadow-2xl">
    <div class="mb-10">
      <img src="/onboardguard_logo_1777340930385.png" class="w-12 h-12 object-contain" alt="Logo">
    </div>
    <nav class="flex-1 w-full space-y-4 px-4">
      <a routerLink="/officer/alerts" routerLinkActive="bg-indigo-600 text-white" class="flex items-center gap-4 p-3 rounded-2xl transition-all">
        <span class="material-symbols-outlined">queue</span>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap font-black">Verification Queue</span>
      </a>
      <a routerLink="/officer/investigation" routerLinkActive="bg-indigo-600 text-white" class="hidden flex items-center gap-4 p-3 hover:bg-slate-800 rounded-2xl transition-all">
        <span class="material-symbols-outlined">fact_check</span>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap font-black">Verification Details</span>
      </a>
      <a routerLink="/officer/case-review" routerLinkActive="bg-indigo-600 text-white" class="flex items-center gap-4 p-3 hover:bg-slate-800 rounded-2xl transition-all">
        <span class="material-symbols-outlined">assignment</span>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap font-black">Case Review</span>
      </a>
      <a routerLink="/officer/escalated" routerLinkActive="bg-indigo-600 text-white" class="flex items-center gap-4 p-3 hover:bg-slate-800 rounded-2xl transition-all">
        <span class="material-symbols-outlined text-red-400">gpp_maybe</span>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap font-black">Escalated</span>
      </a>
      <a href="#" class="flex items-center gap-4 p-3 hover:bg-slate-800 rounded-2xl transition-all">
        <span class="material-symbols-outlined">history</span>
        <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap font-black">Audit History</span>
      </a>
    </nav>
    <div class="mt-auto px-4 w-full">
       <div class="flex items-center gap-4 p-3 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
         <div class="w-8 h-8 rounded-xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center shrink-0">
             <span class="text-[10px] font-black uppercase">{{displayName().charAt(0)}}</span>
          </div>
          <div class="flex flex-col opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
             <span class="text-[10px] font-black text-white">{{displayName()}}</span>
             <span class="text-[8px] font-bold text-slate-500 tracking-widest uppercase">{{roleLabel()}}</span>
          </div>
       </div>
    </div>
  </aside>

  <!-- Main View -->
  <main class="flex-1 flex flex-col bg-slate-900 relative overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>
