<div class="flex h-screen bg-slate-950 text-white">
  <aside class="w-72 bg-slate-950 border-r border-white/10 flex flex-col p-6">
    <!-- Logo + Module Title -->
    <div class="flex items-center gap-3 mb-10">
      <img src="/onboardguard_logo_1777340930385.png" class="w-10 h-10 object-contain" alt="Logo">
      <div>
        <div class="text-xl font-black tracking-tight">Officer Desk</div>
        <div class="text-[10px] uppercase tracking-[0.25em] text-slate-400">{{ roleSummary() }}</div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-2">

      <!-- ── L1 ONLY ── -->
      <div *ngIf="isL1()">
        <!-- Section Label -->
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-600 px-3 mb-3 mt-2">Verification</p>

        <a routerLink="/officer/alerts" routerLinkActive="bg-white/10 text-white"
           class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined">queue</span>
          Candidate Queue
        </a>

        <a routerLink="/officer/case-review" routerLinkActive="bg-white/10 text-white"
           class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined">assignment</span>
          Open Cases
        </a>

        <!-- Section Label -->
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-600 px-3 mb-3 mt-6">Screening Alerts</p>

        <a routerLink="/officer/alert-board" routerLinkActive="bg-white/10 text-white"
           class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined">notifications_active</span>
          Alert Board
        </a>
      </div>

      <!-- ── L2 ONLY ── -->
      <div *ngIf="isL2()">
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-600 px-3 mb-3 mt-2">Checker Review</p>

        <a routerLink="/officer/escalated" routerLinkActive="bg-white/10 text-white"
           class="flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-300 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined text-red-400">gpp_maybe</span>
          Escalated Cases
        </a>
      </div>

    </nav>

    <!-- User Footer -->
    <div class="pt-6 border-t border-white/10 space-y-3">
      <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl">
        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-xs font-black shrink-0">
          {{ displayName().charAt(0) }}
        </div>
        <div class="flex flex-col min-w-0">
          <span class="text-sm font-black truncate">{{ displayName() }}</span>
          <span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 truncate">{{ roleLabel() }}</span>
        </div>
      </div>
      <button (click)="logout()"
        class="w-full flex items-center gap-3 p-3 rounded-2xl font-bold text-slate-400 hover:bg-white/5 hover:text-white transition-all text-sm">
        <span class="material-symbols-outlined">logout</span>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden bg-slate-100 text-slate-900">
    <router-outlet></router-outlet>
  </main>
</div>
