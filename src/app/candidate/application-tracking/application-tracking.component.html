<div class="p-10 space-y-10 max-w-4xl mx-auto w-full">
  <header class="flex flex-col gap-2">
    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Application Tracking</h2>
    <p class="text-slate-500 font-medium">Track the real-time progress of your onboarding verification.</p>
  </header>

  <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 p-10 space-y-10">
    <div class="flex items-center justify-between border-b border-slate-100 pb-6">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Verification Timeline</h3>
      <div class="flex items-center gap-3 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-full">
         <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
         <span class="text-xs font-bold">Under Review</span>
      </div>
    </div>

    <div class="space-y-6">
      <div *ngFor="let step of steps()" class="bg-slate-50 p-6 rounded-[24px] border border-slate-100 hover:border-primary/20 hover:shadow-lg transition-all flex items-center gap-6 group">
        <div [class]="'w-14 h-14 rounded-2xl flex items-center justify-center ' + getStatusBg(step.status)">
          <span class="material-symbols-outlined text-[24px]">{{step.icon}}</span>
        </div>
        <div class="flex-1">
          <h4 class="text-base font-black text-slate-800">{{step.title}}</h4>
          <p class="text-sm text-slate-500 font-medium mt-1">{{step.description}}</p>
        </div>
        <div class="text-right flex flex-col items-end gap-2">
           <span [class]="'text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full ' + getStatusText(step.status)">
             {{step.status}}
           </span>
           <span *ngIf="step.status === 'completed'" class="text-xs text-slate-400 font-bold">Verified</span>
           <span *ngIf="step.status === 'error'" class="text-xs text-rose-500 font-bold hover:underline cursor-pointer">Action Required</span>
        </div>
      </div>
    </div>
  </div>
</div>
